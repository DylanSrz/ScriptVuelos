name: Monitor Tiquetes BAQ ↔ BOG

on:
  schedule:
    # Corre todos los días a las 7:00 AM hora Colombia (UTC-5 = 12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:   # Permite correrlo manualmente desde GitHub

jobs:
  monitor-vuelos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar monitor de vuelos
        env:
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          AVIASALES_TOKEN:   ${{ secrets.AVIASALES_TOKEN }}
        run: python flight_monitor.py
